<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <!-- Vertices -->
    <circle cx="50" cy="10" r="4" fill="lightcoral" />
    <text x="50" y="8" font-size="5" text-anchor="middle" dy="-2">E</text>
    <circle cx="10" cy="80" r="4" fill="lightcoral" />
    <text x="10" y="78" font-size="5" text-anchor="middle" dy="-2">S</text>
    <circle cx="90" cy="80" r="4" fill="lightcoral" />
    <text x="90" y="78" font-size="5" text-anchor="middle" dy="-2">C.T.</text>

    <!-- Edges -->
    <defs>
        <marker id="arrow3" viewBox="0 0 10 10" refX="5" refY="5"
            markerWidth="3" markerHeight="3"
            orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="red" />
        </marker>
    </defs>

    <!-- E to S (broken) -->
    <path d="M 48 14 L 20 60" stroke="red" stroke-dasharray="2,2" stroke-width="0.5" />

    <!-- S to C.T. (broken) -->
    <path d="M 14 80 L 70 80" stroke="red" stroke-dasharray="2,2" stroke-width="0.5" />


    <!-- C.T. to E (broken) -->
    <path d="M 88 78 L 60 30" stroke="red" stroke-dasharray="2,2" stroke-width="0.5" />

</svg>